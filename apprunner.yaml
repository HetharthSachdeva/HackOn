version: 1.0
runtime: build
build:
  commands:
    build:
      - echo "Building Docker image is handled natively by App Runner when using Dockerfile"
run:
  # The port your FastAPI app runs on
  network:
    port: 8000
    env: APP_PORT
  
  # Health check configuration
  health_check:
    protocol: HTTP
    path: /api/v1/health
    interval: 10
    timeout: 5
    healthy_threshold: 1
    unhealthy_threshold: 5
